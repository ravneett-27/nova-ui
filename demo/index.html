<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaUI Demo</title>

  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <h1 class="text-center">NovaUI Framework</h1>

  <button class="btn btn-primary">Primary Button</button>

  <table class="mt-2">

    </tr>

    <tr>
      <td>Bimbola</td>
      <td>UI Components</td>
    </tr>

    <tr>
      <td>Revneet</td>
      <td>Framework Architecture</td>
    </tr>
  </table>

</html>
